<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Departments</title>
    <meta charset="UTF-8"/>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 8px;
            text-align: left;
        }

        .actions a {
            margin-right: 10px;
        }
    </style>
</head>
<body>

<h1>Departments</h1>

<p>
    <a th:href="@{/departments/new}">Create Department</a>
</p>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="department : ${departments}">
        <td th:text="${department.id}"></td>
        <td th:text="${department.name}"></td>
        <td class="actions">
            <a th:href="@{/departments/{id}/edit(id=${department.id})}">Edit</a>
            <a th:href="@{/departments/{id}/delete(id=${department.id})}">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
